name: Update Predictor Data and Model

on:
  schedule:
    # Runs at 00:00 every Sunday (UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        run: python scraper.py

      - name: Run Model Training
        run: python model.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add chapter_data.csv model_parameters.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update manga data and model parameters" && git push)
